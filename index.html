<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gustavo Antunes | Dev</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Fira Code', monospace;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f2027;
  overflow:hidden;
  color:white;
}

/* partículas */
#particles{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}

/* container */
.container{
  width:350px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  text-align:center;
}

/* foto */
.foto img{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #00ff9d;
  box-shadow:0 0 12px #00ff9d;
  transition:0.3s;
}

.foto img:active{
  transform:scale(1.08);
}

/* nome */
.nome{
  margin-top:15px;
  font-size:26px;
}

/* usuário */
.user{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  margin-top:5px;
}

.verificado{
  width:16px;
  height:16px;
}

/* terminal */
.code{
  margin-top:20px;
  background:#00000060;
  padding:14px;
  border-radius:8px;
  font-size:13px;
  color:#00ff9d;
  text-align:left;
  min-height:70px;
}

/* botões */
.botoes{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.botao{
  padding:12px;
  border-radius:8px;
  border:1px solid #00ff9d;
  color:#00ff9d;
  text-decoration:none;
  transition:0.3s;
}

.botao:hover{
  background:#00ff9d;
  color:#0f2027;
  transform:scale(1.05);
  box-shadow:0 0 15px #00ff9d;
}

/* footer */
footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}

/* botão de idioma flutuante */
.language-menu {
  position: fixed;
  top: 15px;
  right: 20px;
  z-index: 10;
}

#lang-btn {
  background:#00ff9d;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  color:#0f2027;
  transition:0.3s;
}

#lang-btn:hover {
  transform:scale(1.1);
}

.lang-options {
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:rgba(0,0,0,0.8);
  border-radius:6px;
  overflow:hidden;
  text-align:left;
}

.lang-options span {
  display:block;
  padding:8px 12px;
  cursor:pointer;
  color:#00ff9d;
  transition:0.3s;
}

.lang-options span:hover {
  background:#00ff9d;
  color:#0f2027;
}

/* modo claro */
@media (prefers-color-scheme: light){
  body{
    background:#e8f5e9;
    color:#1b5e20;
  }
  .container{
    background:rgba(255,255,255,0.7);
  }
  .botao{
    border:1px solid #2e7d32;
    color:#2e7d32;
  }
  .botao:hover{
    background:#2e7d32;
    color:white;
  }
  .code{
    background:#ffffff;
    color:#1b5e20;
  }
  #lang-btn{
    background:#2e7d32;
    color:white;
  }
  .lang-options{
    background:rgba(255,255,255,0.9);
  }
  .lang-options span{
    color:#2e7d32;
  }
  .lang-options span:hover{
    background:#2e7d32;
    color:white;
  }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- botão flutuante de idiomas -->
<div class="language-menu">
  <button id="lang-btn">🌐</button>
  <div class="lang-options">
    <span data-lang="pt">PT🇧🇷</span>
    <span data-lang="en">EN🇺🇸</span>
    <span data-lang="es">EP🇪🇸</span>
    <span data-lang="it">IT🇮🇹</span>
  </div>
</div>

<div class="container">

  <div class="foto">
    <img src="foto.jpg" alt="Foto">
  </div>

  <h1 class="nome" id="nome">Gustavo Antunes</h1>

  <div class="user">
    <span id="usuario">@eo._.guh</span>
    <svg class="verificado" viewBox="0 0 40 40" fill="#00ff9d">
      <path d="M19.998 3.094 14.638 0l-2.972 5.15H5.432v6.354L0 14.64 3.094 20 0 25.359l5.432 3.137v5.905h5.975L14.638 40l5.36-3.094L25.358 40l3.232-5.6h6.162v-6.01L40 25.359 36.905 20 40 14.641l-5.248-3.03v-6.46h-6.419L25.358 0l-5.36 3.094Zm7.415 11.225 2.254 2.287-11.43 11.5-6.835-6.93 2.244-2.258 4.587 4.581 9.18-9.18Z"/>
    </svg>
  </div>

  <div class="code" id="terminal"></div>

  <div class="botoes">
    <a class="botao" id="contato" href="#">CONTATO</a>
    <a class="botao" id="email" href="#">E-MAIL</a>
    <a class="botao" id="curriculo" href="#" target="_blank">CURRÍCULO</a>
  </div>

  <footer id="footer">feito com ☕ e código</footer>

</div>

<script>

    linkContato: "https://wa.me/5549999862424?text=Olá!%20Tudo%20bem?%0AEncontrei%20seu%20site%20e%20achei%20muito%20interessante.%0AEstou%20procurando%20algo%20parecido.%0ASe%20puder,%20me%20passe%20mais%20informações.%20Obrigado!",
    linkEmail: "mailto:gus.tavooficial.mid1@gmail.com?subject=Interesse%20em%20site&body=Olá!%20Tudo%20bem?%0AEncontrei%20seu%20site%20e%20achei%20muito%20interessante.%0ASe%20puder,%20me%20passe%20mais%20informações.%20Obrigado!",
    linkCurriculo: "https://docs.google.com/spreadsheets/d/16Q0_4KrR_O6UzXJPJP_euCNKXkdL1xR8/edit?usp=drivesdk"
  },
  en: {
    nome: "Gustavo Antunes",
    usuario: "@eo._.guh",
    terminalClaro: `function startDay(){\n    drinkCoffee();\n    writeCode();\n}`,
    terminalEscuro: `while(coffee != "empty"){\n    code();\n}`,

    linkCurriculo: "https://docs.google.com/spreadsheets/d/1y8n-6WMZa6lXcsRFvdxD948oPh33GGJc/edit?usp=drivesdk&ouid=115964333092820179734&rtpof=true&sd=true"

    linkEmail: "mailto:gus.tavooficial.mid1@gmail.com?subject=Interesse%20in%20sito&body=Ciao!%20Come%20stai?%0AHo%20trovato%20il%20tuo%20sito%20web.%0APotresti%20inviarmi%20più%20informazioni?",

  }
};

/* efeito digitação */
function digitar(texto){
  const terminal = document.getElementById("terminal");
  terminal.innerHTML = "";
  let i = 0;
  function escrever(){
    if(i < texto.length){
      terminal.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escrever,40);
    }
  }
  escrever();
}

/* atualizar conteúdo do idioma */
function atualizarIdioma(lang){
  const t = textos[lang];
  document.getElementById("nome").innerText = t.nome;
  document.getElementById("usuario").innerText = t.usuario;
  document.getElementById("contato").innerText = t.contato;
  document.getElementById("email").innerText = t.email;
  document.getElementById("curriculo").innerText = t.curriculo;
  document.getElementById("footer").innerText = t.footer;

  document.getElementById("contato").href = t.linkContato;
  document.getElementById("email").href = t.linkEmail;
  document.getElementById("curriculo").href = t.linkCurriculo;

  const modoClaro = window.matchMedia('(prefers-color-scheme: light)').matches;
  const textoTerminal = modoClaro ? t.terminalClaro : t.terminalEscuro;
  digitar(textoTerminal);
}

/* botão idioma flutuante */
const langBtn = document.getElementById("lang-btn");
const langOptions = document.querySelector(".lang-options");

langBtn.addEventListener("click", ()=>{
  langOptions.style.display = langOptions.style.display === "block" ? "none" : "block";
});

document.querySelectorAll(".lang-options span").forEach(option=>{
  option.addEventListener("click", ()=>{
    const lang = option.getAttribute("data-lang");
    atualizarIdioma(lang);
    langOptions.style.display = "none";
  });
});

// fecha menu se clicar fora
window.addEventListener("click", (e)=>{
  if(!langBtn.contains(e.target) && !langOptions.contains(e.target)){
    langOptions.style.display = "none";
  }
});

/* detectar mudança de tema */
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  const lang = "pt"; // ou armazenar último idioma selecionado
  atualizarIdioma(lang);
});

/* inicializar */
atualizarIdioma('pt');

/* partículas */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<70;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="#00ff9d";
    ctx.fill();
    p.y += 0.3;
    if(p.y > canvas.height) p.y = 0;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

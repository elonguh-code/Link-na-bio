<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gustavo Antunes | Dev</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Fira Code', monospace;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f2027;
  overflow:hidden;
  color:white;
}

#particles{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}

.container{
  width:350px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  text-align:center;
}

.foto img{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #00ff9d;
  box-shadow:0 0 12px #00ff9d;
  transition:0.3s;
}

.foto img:active{
  transform:scale(1.08);
}

.nome{
  margin-top:15px;
  font-size:26px;
}

.user{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  margin-top:5px;
}

.verificado{
  width:16px;
  height:16px;
}

.code{
  margin-top:20px;
  background:#00000060;
  padding:14px;
  border-radius:8px;
  font-size:13px;
  color:#00ff9d;
  text-align:left;
  min-height:70px;
}

.botoes{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.botao{
  padding:12px;
  border-radius:8px;
  border:1px solid #00ff9d;
  color:#00ff9d;
  text-decoration:none;
  transition:0.3s;
}

.botao:hover{
  background:#00ff9d;
  color:#0f2027;
  transform:scale(1.05);
  box-shadow:0 0 15px #00ff9d;
}

footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}

/* botão idioma */
.language-menu {
  position: fixed;
  top: 15px;
  right: 20px;
  z-index: 10;
}

#lang-btn {
  background:#00ff9d;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  color:#0f2027;
}

.lang-options {
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:rgba(0,0,0,0.8);
  border-radius:6px;
  overflow:hidden;
}

.lang-options span {
  display:block;
  padding:8px 12px;
  cursor:pointer;
  color:#00ff9d;
}

.lang-options span:hover {
  background:#00ff9d;
  color:#0f2027;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="language-menu">
  <button id="lang-btn">PT</button>
  <div class="lang-options">
    <span data-lang="pt">PT🇧🇷</span>
    <span data-lang="en">EN🇺🇸</span>
    <span data-lang="es">ES🇪🇸</span>
    <span data-lang="it">IT🇮🇹</span>
  </div>
</div>

<div class="container">

  <div class="foto">
    <img src="foto.jpg">
  </div>

  <h1 class="nome" id="nome"></h1>

  <div class="user">
    <span id="usuario"></span>
  </div>

  <div class="code" id="terminal"></div>

  <div class="botoes">
    <a class="botao" id="contato">CONTATO</a>
    <a class="botao" id="email">E-MAIL</a>
    <a class="botao" id="curriculo" target="_blank">CURRÍCULO</a>
  </div>

  <footer id="footer"></footer>

</div>

<script>
const textos = {
  pt: {
    nome:"Gustavo Antunes",
    usuario:"@eo._.guh",
    terminal:`while(coffee!="empty"){ code(); }`,
    contato:"CONTATO",
    email:"E-MAIL",
    curriculo:"CURRÍCULO",
    footer:"feito com ☕ e código",
    linkContato:"https://wa.me/5549999862424",
    linkEmail:"mailto:gus.tavooficial.mid1@gmail.com",
    linkCurriculo:"#"
  },
  en: {
    nome:"Gustavo Antunes",
    usuario:"@eo._.guh",
    terminal:`while(coffee!="empty"){ code(); }`,
    contato:"CONTACT",
    email:"E-MAIL",
    curriculo:"RESUME",
    footer:"made with ☕ and code",
    linkContato:"https://wa.me/5549999862424",
    linkEmail:"mailto:gus.tavooficial.mid1@gmail.com",
    linkCurriculo:"#"
  }
};

function digitar(texto){
  const el = document.getElementById("terminal");
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<texto.length){
      el.innerHTML+=texto[i++];
      setTimeout(t,30);
    }
  }
  t();
}

function atualizarIdioma(lang){
  const t = textos[lang];

  nome.innerText = t.nome;
  usuario.innerText = t.usuario;
  contato.innerText = t.contato;
  email.innerText = t.email;
  curriculo.innerText = t.curriculo;
  footer.innerText = t.footer;

  contato.href = t.linkContato;
  email.href = t.linkEmail;
  curriculo.href = t.linkCurriculo;

  document.getElementById("lang-btn").innerText = lang.toUpperCase();

  digitar(t.terminal);

  localStorage.setItem("lang",lang);
}

const langBtn = document.getElementById("lang-btn");
const menu = document.querySelector(".lang-options");

langBtn.onclick = ()=> menu.style.display = menu.style.display=="block"?"none":"block";

document.querySelectorAll(".lang-options span").forEach(el=>{
  el.onclick=()=>{
    atualizarIdioma(el.dataset.lang);
    menu.style.display="none";
  }
});

window.onclick = e=>{
  if(!langBtn.contains(e.target) && !menu.contains(e.target)){
    menu.style.display="none";
  }
};

const langSalvo = localStorage.getItem("lang") || "pt";
atualizarIdioma(langSalvo);

/* partículas */
const c=document.getElementById("particles");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(pt=>{
    ctx.beginPath();
    ctx.arc(pt.x,pt.y,2,0,6.28);
    ctx.fillStyle="#00ff9d";
    ctx.fill();
    pt.y+=0.5;
    if(pt.y>c.height) pt.y=0;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Fira Code', monospace;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f2027;
  overflow:hidden;
  color:white;
}

/* partículas */
#particles{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}

/* container */
.container{
  width:350px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  text-align:center;
}

/* foto */
.foto img{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #00ff9d;
  box-shadow:0 0 12px #00ff9d;
  transition:0.3s;
}

.foto img:active{
  transform:scale(1.08);
}

/* nome */
.nome{
  margin-top:15px;
  font-size:26px;
}

/* usuário */
.user{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  margin-top:5px;
}

.verificado{
  width:16px;
  height:16px;
}

/* bandeiras */
.flags{
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.flag{
  width:24px;
  height:18px;
  cursor:pointer;
  border:2px solid transparent;
  border-radius:4px;
  transition:0.3s;
}

.flag:hover{
  transform:scale(1.2);
  border-color:#00ff9d;
}

/* terminal */
.code{
  margin-top:20px;
  background:#00000060;
  padding:14px;
  border-radius:8px;
  font-size:13px;
  color:#00ff9d;
  text-align:left;
  min-height:70px;
}

/* botões */
.botoes{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.botao{
  padding:12px;
  border-radius:8px;
  border:1px solid #00ff9d;
  color:#00ff9d;
  text-decoration:none;
  transition:0.3s;
}

.botao:hover{
  background:#00ff9d;
  color:#0f2027;
  transform:scale(1.05);
  box-shadow:0 0 15px #00ff9d;
}

/* footer */
footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}

/* modo claro */
@media (prefers-color-scheme: light){
  body{
    background:#e8f5e9;
    color:#1b5e20;
  }
  .container{
    background:rgba(255,255,255,0.7);
  }
  .botao{
    border:1px solid #2e7d32;
    color:#2e7d32;
  }
  .botao:hover{
    background:#2e7d32;
    color:white;
  }
  .code{
    background:#ffffff;
    color:#1b5e20;
  }
  .flag:hover{
    border-color:#2e7d32;
  }
}
</style>

/* efeito digitação */
function digitar(texto){
  const terminal = document.getElementById("terminal");
  terminal.innerHTML = "";
  let i = 0;
  function escrever(){
    if(i < texto.length){
      terminal.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escrever,40);
    }
  }
  escrever();
}

/* atualizar conteúdo do idioma */
function atualizarIdioma(lang){
  const t = textos[lang];
  document.getElementById("nome").innerText = t.nome;
  document.getElementById("usuario").innerText = t.usuario;
  document.getElementById("contato").innerText = t.contato;
  document.getElementById("email").innerText = t.email;
  document.getElementById("curriculo").innerText = t.curriculo;
  document.getElementById("footer").innerText = t.footer;

  document.getElementById("contato").href = t.linkContato;
  document.getElementById("email").href = t.linkEmail;
  document.getElementById("curriculo").href = t.linkCurriculo;

  const modoClaro = window.matchMedia('(prefers-color-scheme: light)').matches;
  const textoTerminal = modoClaro ? t.terminalClaro : t.terminalEscuro;
  digitar(textoTerminal);
}

/* clique nas bandeiras */
document.querySelectorAll(".flag").forEach(flag => {
  flag.addEventListener("click", () => {
    const lang = flag.getAttribute("data-lang");
    atualizarIdioma(lang);
  });
});

/* detectar mudança de tema */
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  const lang = "pt"; // ou armazenar último idioma selecionado
  atualizarIdioma(lang);
});

/* inicializar */
atualizarIdioma('pt');

/* partículas */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<70;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="#00ff9d";
    ctx.fill();
    p.y += 0.3;
    if(p.y > canvas.height) p.y = 0;
  });
  requestAnimationFrame(draw);
}
draw();
